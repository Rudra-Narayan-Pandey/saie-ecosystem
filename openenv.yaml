name: saie
version: "2.0.0"
display_name: "Self-Healing AI Ecosystem with Synthetic Reality Defense"
description: >
  A research-grade simulation environment where an AI agent must maintain
  the stability of a digital content ecosystem under adversarial conditions
  including misinformation, deepfakes, coordinated bot attacks, and adaptive
  adversaries. The agent applies content moderation and trust management actions
  to prevent ecosystem collapse. Features partial observability, belief propagation,
  probabilistic action success, and an adaptive attack system that counters the AI's
  recent strategy.

author: "SAIE Research Team"
license: MIT

environment:
  module: env
  class: SAIEEnvironment
  observation_class: Observation
  action_class: Action
  reward_class: Reward

tasks:
  - id: easy
    description: >
      Small-scale attack. 3 malicious agents spread basic misinformation.
      Goal: maintain system_health > 0.6 over 30 steps.
    max_steps: 30
    difficulty: easy
    entrypoint: easy.py
    run_fn: easy:run_task
    grader_fn: graders:grade_easy

  - id: medium
    description: >
      Coordinated bot cluster attack with mixed misinformation and deepfakes.
      Goal: prevent trust collapse and maintain system_health > 0.5 over 50 steps.
    max_steps: 50
    difficulty: medium
    entrypoint: medium.py
    run_fn: medium:run_task
    grader_fn: graders:grade_medium

  - id: hard
    description: >
      Multi-stage adversarial assault with adaptive attackers and partial observability.
      Goal: prevent ecosystem collapse and keep system_health > 0.4 over 80 steps.
    max_steps: 80
    difficulty: hard
    entrypoint: hard.py
    run_fn: hard:run_task
    grader_fn: graders:grade_hard

observation_space:
  type: structured
  fields:
    - name: step
      type: integer
    - name: agents
      type: list[AgentModel]
    - name: content_pool
      type: list[ContentItem]
      note: "Partially observable — stealthy content may be hidden"
    - name: virality_scores
      type: dict[str, float]
    - name: trust_scores
      type: dict[str, float]
    - name: misinformation_ratio
      type: float
      range: [0.0, 1.0]
    - name: deepfake_ratio
      type: float
      range: [0.0, 1.0]
    - name: system_health
      type: float
      range: [0.0, 1.0]
    - name: attack_signals
      type: list[AttackSignal]
      note: "High-stealth attacks may not appear until detected"
    - name: active_agent_count
      type: integer
    - name: flagged_content_count
      type: integer
    - name: attack_history
      type: list[AttackHistoryEntry]
      note: "Memory of past attacks and AI responses (last 20 entries)"
    - name: consecutive_healthy_steps
      type: integer
      note: "Steps the system has remained above 0.65 health consecutively"
    - name: steps_since_last_detection
      type: integer
      note: "Steps since an attack was last detected (drives delay penalty)"
    - name: health_trend
      type: float
      note: "Rolling 3-step health delta"
    - name: risk_score
      type: float
      range: [0.0, 1.0]
      note: "Composite situational risk (misinfo + deepfake + attack pressure + inv health)"
    - name: threat_level
      type: string
      values: ["low", "medium", "high"]
      note: "Categorical threat assessment derived from risk_score"
    - name: urgency
      type: boolean
      note: "True when threat_level=high, health<0.4, or detection delay>5 steps"

action_space:
  type: discrete
  actions:
    - boost_content
    - suppress_content
    - ban_agent
    - increase_trust
    - deploy_fact_check
    - retrain_algorithm
    - quarantine_cluster
    - run_deepfake_detection
    - attach_warning_label
    - trace_origin

reward:
  range: [-13.0, 12.0]
  components:
    - health_delta:           "10x health change per step"
    - misinfo_penalty:        "-8x misinformation spike"
    - deepfake_penalty:       "-5x deepfake spike"
    - collapse_penalty:       "-5.0 if system_health < 0.15"
    - early_detection_bonus:  "+1.5 per newly detected attack"
    - stability_bonus:        "+0.15 per consecutive healthy step (capped +2.0)"
    - delay_penalty:          "exponential penalty for ignoring known attacks"

advanced_mechanics:
  adaptive_attacks:
    description: >
      Attacks adapt to the AI's recent strategy. Frequent fact-checking increases
      deepfake spawns. Frequent banning spawns new bot clusters. Frequent deepfake
      detection increases attacker stealth.
  partial_observability:
    description: >
      High-stealth agents produce content not immediately visible to the AI.
      trace_origin and run_deepfake_detection can reveal hidden content.
  belief_propagation:
    description: >
      Content with high belief_score (> 0.7) spreads more aggressively.
      Deepfakes with high believability are harder to detect and spread more aggressively.
  probabilistic_actions:
    description: >
      All actions have a base success probability (82–97%). Failed actions
      have no effect; the AI must account for this uncertainty.
  memory_system:
    description: >
      attack_history in Observation provides the last 20 attack events with
      AI responses, enabling long-term strategy adaptation.

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
    - TASK

docker:
  image: saie-env
  dockerfile: Dockerfile
